name: Scrape Flights

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      route:
        description: 'Specific route to scrape (e.g., LHR-JFK)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package.json
      
      - name: Install Playwright
        run: |
          cd scraper
          npm install
          npx playwright install chromium
      
      - name: Run scraper
        run: |
          cd scraper
          npm run scrape
        env:
          NODE_ENV: production
      
      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/
          git diff --staged --quiet || (git commit -m "Update flight data [$(date -u +%Y-%m-%d\ %H:%M:%S)]" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
