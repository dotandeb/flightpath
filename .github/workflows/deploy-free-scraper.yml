name: Deploy Free Scraper to Vercel

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'flightpath-free-scraper/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: flightpath-free-scraper/package-lock.json

      - name: Install dependencies
        working-directory: ./flightpath-free-scraper
        run: npm ci

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_FREE_SCRAPER }}
          vercel-args: '--prod'
          working-directory: ./flightpath-free-scraper
