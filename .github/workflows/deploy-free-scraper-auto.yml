name: Deploy Free Scraper (Auto)

on:
  push:
    branches: [master, main]
    paths: ['flightpath-free-scraper/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        working-directory: ./flightpath-free-scraper
        run: |
          vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} 2>&1 | tee deploy.log
          
          # Extract and save the URL
          URL=$(grep -o 'https://[^[:space:]]*\.vercel\.app' deploy.log | tail -1)
          echo "Deployed to: $URL"
          echo "DEPLOY_URL=$URL" >> $GITHUB_ENV

      - name: Comment Deploy URL
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const url = process.env.DEPLOY_URL || 'Check Vercel dashboard';
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🚀 Free Scraper Deployed: ${url}`
            });
